[package]
name = "fc-dev"
# fc-dev releases on its own cadence — not tied to the workspace version.
# Bump this, then tag `fc-dev/vX.Y.Z` to cut a release; the
# release-fc-dev workflow does the rest.
version = "0.4.9"
edition.workspace = true
description = "FlowCatalyst Development Monolith - All components in a single binary"

[dependencies]
fc-common = { path = "../../crates/fc-common" }
fc-router = { path = "../../crates/fc-router" }
# Queue reuses the embedded Postgres as an SQS replacement for local dev —
# one DB, one pool, queue tables live alongside control-plane tables.
fc-queue = { path = "../../crates/fc-queue", features = ["postgres"] }
# Outbox supports all database backends - reads from developer's app database
fc-outbox = { path = "../../crates/fc-outbox", features = ["sqlite", "postgres", "mongo"] }
fc-stream = { path = "../../crates/fc-stream" }
fc-standby = { path = "../../crates/fc-standby" }
fc-platform = { path = "../../crates/fc-platform" }
fc-mcp = { path = "../../crates/fc-mcp" }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
sqlx = { workspace = true }
anyhow = { workspace = true }
metrics = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
clap = { version = "4.5", features = ["derive", "env"] }
uuid = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
dotenvy = "0.15.7"
rust-embed = { workspace = true }
mime_guess = "2"
# Embedded PostgreSQL for zero-friction local dev. The `bundled` feature
# downloads the pg binary at *build* time and embeds it into the compiled
# fc-dev exe — first run extracts from the binary itself, no runtime network
# call. Trade-off: fc-dev grows ~80MB per target triple, but the whole
# artifact is covered by one signature / one hash for corporate review.
#
# Gated behind the `embedded-db` feature (on by default for fc-dev only)
# so fc-server never pulls this dep.
## `default-features = false` is load-bearing: postgresql_embedded's
## default feature set includes `native-tls`, which propagates to
## `postgresql_archive/native-tls → reqwest/native-tls`. Through cargo's
## workspace-wide feature unification, that drags OpenSSL/native-tls
## into every binary in the workspace, not just fc-dev. The Windows CI
## release job needed a `vcpkg install openssl:x64-windows-static-md`
## step purely because of that. Explicit `rustls` feature keeps the
## embedded-pg download path (reqwest GET to github releases) on
## rustls and matches the rest of the workspace's TLS posture.
postgresql_embedded = { version = "0.19", default-features = false, features = ["bundled", "rustls", "tokio", "theseus"], optional = true }
# Used for both the embedded-pg data dir and the JWT key cache dir, so it's
# unconditional even though the embedded-pg bundle is feature-gated.
dirs = "5"
# Self-update: drives `fc-dev upgrade` against GitHub Releases. Uses rustls
# (not native TLS) to avoid macOS Security framework / Windows schannel
# linking quirks in our cross-platform release bundles. Both archive
# formats are enabled: tar.gz for macOS/Linux, zip for Windows.
self_update = { version = "0.41", default-features = false, features = ["rustls", "compression-flate2", "archive-tar", "archive-zip"] }
# Version comparison for both the upgrade subcommand and the startup check.
semver = "1"
# Startup version check: serde_json already in deps; chrono used for cache TTL.
chrono = { workspace = true }
# `fc-dev init` mints a CONFIDENTIAL OAuth client secret — 32 random bytes
# base64-encoded then encrypted via fc-platform's EncryptionService. These
# two crates are the only callers; the rest of fc-dev's secret material
# comes from fc-platform's password service.
rand = { workspace = true }
base64 = { version = "0.22" }

[features]
default = ["embedded-db"]
embedded-db = ["dep:postgresql_embedded"]
