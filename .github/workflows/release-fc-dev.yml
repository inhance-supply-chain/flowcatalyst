name: Release fc-dev

# Triggered by pushing a tag like `fc-dev/v0.2.0`. Builds native binaries
# for macOS-arm64, Linux-x64, Linux-arm64 and Windows-x64, then publishes
# a GitHub Release with all four archives + their SHA256 sidecars.
#
# The frontend is built once on Ubuntu and shared via artifact — every
# platform job sets FC_SKIP_FRONTEND_BUILD=1 and links against the prebuilt
# frontend/dist. This saves ~30s per platform and guarantees identical
# embedded UI bytes across architectures.
#
# Why native runners (no cross-compile): `postgresql_embedded` with the
# `bundled` feature embeds platform-specific PG binaries at build time;
# cross-compiling would need fragile pre-fetched bundles per target.

on:
  push:
    tags:
      - "fc-dev/v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. fc-dev/v0.2.0"
        required: true

permissions:
  contents: write
  # Required for cosign keyless signing on Linux artifacts: cosign asks
  # for a short-lived OIDC token from GitHub Actions, exchanges it with
  # Sigstore's Fulcio for a code-signing cert, and records the signature
  # in the public Rekor transparency log. No long-lived keys involved.
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag + version
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          if [[ ! "$TAG" =~ ^fc-dev/v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag '$TAG' does not match fc-dev/vX.Y.Z[-suffix]" >&2
            exit 1
          fi
          VERSION="${TAG#fc-dev/v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build-frontend:
    name: Build frontend (shared)
    runs-on: ubuntu-24.04
    needs: prepare
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      # The `packageManager` field lives in frontend/package.json, not the
      # repo-root package.json. Tell pnpm/action-setup explicitly.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install + build
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: [prepare, build-frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            archive_ext: tar.gz
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
            archive_ext: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-2022
            archive_ext: zip
            bin_suffix: .exe
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # `.cargo/config.toml` pins `-Clink-arg=-fuse-ld=lld` on every Linux
      # target for fast incremental dev builds. CI runners don't ship lld.
      - name: Install lld (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y lld

      # We used to need `vcpkg install openssl:x64-windows-static-md` on
      # Windows because `openssl-sys` linked against a system install.
      # The workspace now vendors OpenSSL via `openssl = { features =
      # ["vendored"] }` in fc-platform/Cargo.toml — `openssl-src` builds
      # OpenSSL in-tree, output cached by Swatinem/rust-cache above.
      # The one extra dep needed by openssl-src (perl) is preinstalled
      # on every GitHub runner (macOS/Linux/Windows).

      - name: Build
        env:
          FC_SKIP_FRONTEND_BUILD: "1"
          # `postgresql_embedded`'s build script downloads PG binaries from
          # GitHub's `theseus-rs/postgresql-binaries` releases. Unauthenticated
          # API requests are throttled at 60/hour per source IP; with four
          # platform jobs running in parallel on shared runners we hit that
          # ceiling fast. Forwarding GITHUB_TOKEN raises the limit to 5000/hr.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cargo build --release -p fc-dev --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          BIN="fc-dev${{ matrix.bin_suffix }}"
          STAGE="fc-dev-v${VERSION}-${{ matrix.target }}"
          ARCHIVE="${STAGE}.${{ matrix.archive_ext }}"

          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/${BIN}" "$STAGE/"
          cp README.md LICENSE 2>/dev/null "$STAGE/" || true

          # Windows users expect `.zip` natively (Explorer opens it on
          # double-click); macOS/Linux get `.tar.gz` per platform convention.
          # `self_update` matches on the asset filename's target triple
          # and detects archive type by extension, so the asymmetry is fine.
          case "${{ matrix.archive_ext }}" in
            zip)
              # 7z is preinstalled on GitHub Windows runners; `a` (add) into
              # a .zip yields a standard zip archive.
              7z a "$ARCHIVE" "$STAGE" >/dev/null
              ;;
            tar.gz)
              tar -czf "$ARCHIVE" "$STAGE"
              ;;
            *)
              echo "Unknown archive_ext '${{ matrix.archive_ext }}'" >&2
              exit 1
              ;;
          esac

          # SHA256 sidecar. shasum is preinstalled on macOS, sha256sum on
          # Ubuntu; Git Bash on Windows runners has shasum.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi

          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      # Cosign keyless signing on Linux only. macOS/Windows binaries are
      # unsigned for now (see docs/release-signing.md for the eventual
      # codesigning path). Cosign uses GitHub Actions' OIDC identity, so
      # there's nothing to manage — every signature is provably tied to
      # this repo + this tag + this workflow run, recorded in Rekor.
      - name: Install cosign
        if: runner.os == 'Linux'
        uses: sigstore/cosign-installer@v3

      - name: Sign archive (cosign keyless)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cosign sign-blob --yes \
            --output-signature "${ARCHIVE}.sig" \
            --output-certificate "${ARCHIVE}.pem" \
            "$ARCHIVE"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          # Glob captures the archive, .sha256, and (on Linux) .sig + .pem
          # cosign sidecars. Non-Linux runs simply have no sig/pem to match.
          path: ${{ env.ARCHIVE }}*
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: [prepare, build]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          NOTES="fc-dev v${VERSION}

          See [\`bin/fc-dev/CHANGELOG.md\`](bin/fc-dev/CHANGELOG.md) for changes.

          ### Installation

          Download the archive for your platform, extract, and put \`fc-dev\` on your PATH.

          To upgrade an existing install: \`fc-dev upgrade\`.

          ### Verifying

          Every archive ships with a \`*.sha256\` sidecar:
          \`\`\`
          shasum -a 256 -c fc-dev-v${VERSION}-<target>.tar.gz.sha256
          \`\`\`

          Linux archives are additionally signed with [cosign](https://docs.sigstore.dev/) keyless (GitHub Actions OIDC identity, recorded in the public Rekor transparency log):
          \`\`\`
          cosign verify-blob \\
            --signature fc-dev-v${VERSION}-<target>.tar.gz.sig \\
            --certificate fc-dev-v${VERSION}-<target>.tar.gz.pem \\
            --certificate-identity-regexp '^https://github.com/flowcatalyst/flowcatalyst/.github/workflows/release-fc-dev.yml@refs/tags/fc-dev/v' \\
            --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \\
            fc-dev-v${VERSION}-<target>.tar.gz
          \`\`\`"

          # If a draft release for this tag already exists (manual prep),
          # upload to it; otherwise create a fresh one.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --clobber
          else
            gh release create "$TAG" dist/* \
              --title "fc-dev v${VERSION}" \
              --notes "$NOTES" \
              --verify-tag
          fi
